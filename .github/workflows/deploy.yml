name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # ── Job 1: BUILD no runner do GitHub (NUNCA na VPS) ──
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push das imagens (dirigido pelo compose)
        run: |
          docker compose build
          docker compose push

  # ── Job 2: SSH na VPS so pra PUXAR a imagem pronta ──
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /opt/showcase/Transcripts
            if [ -f .deploy-freeze ]; then
              echo "Freeze ativo, abortando deploy"
              exit 1
            fi
            git fetch origin
            git reset --hard origin/main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
